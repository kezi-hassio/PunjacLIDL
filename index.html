<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10b981">
<title>⚡ EV Punjač – Kaluđerica</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 26px;
  height: 26px;
  background: #10b981;
  border-radius: 50%;
  cursor: pointer;
}
.slider::-moz-range-thumb {
  width: 26px;
  height: 26px;
  background: #10b981;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen p-4">

<div class="max-w-md mx-auto space-y-6">

<!-- HEADER -->
<div class="text-center mt-6">
  <h1 class="text-4xl font-bold">⚡ EV Punjač</h1>
  <p class="text-gray-600">Lidl Kaluđerica · 20kW DC</p>
  <div id="online" class="mt-2 text-sm text-green-700 bg-green-100 inline-block px-3 py-1 rounded-full">Online</div>
</div>

<!-- CARD -->
<div class="bg-white rounded-xl shadow-xl p-6 border-2" id="card">
  <div class="flex justify-between mb-4">
    <div>
      <div class="font-bold text-lg">Status</div>
      <div id="statusText" class="text-green-600 font-semibold">Slobodan</div>
    </div>
    <div id="timeLeft" class="text-xl font-bold text-red-600 hidden"></div>
  </div>

  <div id="freeView">
    <button id="openModal" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-600">
      Check-in
    </button>
  </div>

  <div id="busyView" class="hidden space-y-3">
    <div class="text-lg font-semibold" id="busyUser"></div>
    <button id="releaseBtn" class="hidden w-full bg-green-500 text-white py-3 rounded-lg font-bold">
      Oslobodi punjač
    </button>
  </div>
</div>

<!-- HISTORY -->
<div class="bg-white rounded-xl shadow p-4">
  <h3 class="font-bold mb-3">📜 Istorija punjenja</h3>
  <div id="history" class="space-y-2 max-h-64 overflow-y-auto text-sm"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl p-6 w-full max-w-sm space-y-4">
    <h2 class="text-xl font-bold">Check-in</h2>

    <input id="nameInput" placeholder="Tvoje ime"
      class="w-full border rounded-lg px-4 py-2 text-lg">

    <div>
      <div class="flex justify-between text-sm mb-1">
        <span>Trajanje</span>
        <span class="font-bold text-green-600" id="durationLabel">30 min</span>
      </div>
      <input id="slider" type="range" min="15" max="300" step="15" value="30"
        class="w-full slider">
    </div>

    <div class="flex gap-3">
      <button id="cancel" class="flex-1 bg-gray-200 py-2 rounded-lg">Otkaži</button>
      <button id="confirm" class="flex-1 bg-green-500 text-white py-2 rounded-lg font-bold">
        Potvrdi
      </button>
    </div>
  </div>
</div>

<script>
/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyCg-60AsktOtXqj3BOXuIZLY-6dfamqcmo",
  authDomain: "ev-punjac-lidl.firebaseapp.com",
  databaseURL: "https://ev-punjac-lidl-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ev-punjac-lidl"
});

const db = firebase.database();
const sessionRef = db.ref("session");
const historyRef = db.ref("history");

/* DEVICE */
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "dev_" + Math.random().toString(36).slice(2);
  localStorage.setItem("deviceId", deviceId);
}

/* ELEMENTS */
const modal = document.getElementById("modal");
const slider = document.getElementById("slider");
const durationLabel = document.getElementById("durationLabel");
const confirmBtn = document.getElementById("confirm");

/* SLIDER FIX */
slider.addEventListener("input", () => {
  durationLabel.textContent = slider.value + " min";
});

/* MODAL */
document.getElementById("openModal").onclick = () => modal.classList.remove("hidden");
document.getElementById("cancel").onclick = () => modal.classList.add("hidden");

/* CONFIRM */
confirmBtn.onclick = () => {
  const name = document.getElementById("nameInput").value.trim();
  const dur = parseInt(slider.value);
  if (!name) return alert("Unesi ime");

  confirmBtn.disabled = true;
  confirmBtn.textContent = "Upisujem...";

  const now = Date.now();
  const session = {
    name,
    deviceId,
    start: now,
    end: now + dur * 60000,
    duration: dur
  };

  sessionRef.set(session).then(() => {
    historyRef.push(session);
    modal.classList.add("hidden");
  }).finally(() => {
    confirmBtn.disabled = false;
    confirmBtn.textContent = "Potvrdi";
  });
};

/* SESSION LISTENER */
sessionRef.on("value", snap => {
  const s = snap.val();
  const free = !s || s.end < Date.now();

  document.getElementById("freeView").classList.toggle("hidden", !free);
  document.getElementById("busyView").classList.toggle("hidden", free);
  document.getElementById("statusText").textContent = free ? "Slobodan" : "Zauzet";

  if (!free) {
    document.getElementById("busyUser").textContent = "👤 " + s.name;
    const mine = s.deviceId === deviceId;
    document.getElementById("releaseBtn").classList.toggle("hidden", !mine);
    document.getElementById("releaseBtn").onclick = () => sessionRef.remove();
  }
});

/* HISTORY */
historyRef.limitToLast(30).on("value", snap => {
  const h = snap.val() || {};
  const el = document.getElementById("history");
  el.innerHTML = "";
  Object.values(h).reverse().forEach(i => {
    const t = new Date(i.start).toLocaleTimeString("sr-RS",{hour:"2-digit",minute:"2-digit"});
    el.innerHTML += `
      <div class="bg-gray-50 rounded px-3 py-2 flex justify-between">
        <span>${i.name}</span>
        <span class="text-gray-500">${t} · ${i.duration} min</span>
      </div>`;
  });
});
</script>

</body>
</html>
